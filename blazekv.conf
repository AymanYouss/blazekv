# BlazeKV sample configuration (redis.conf-style directives).
# Pass as the first argument: ./blazekv-server blazekv.conf
# Any directive can also be overridden on the CLI, e.g. --port 6380.

bind 0.0.0.0
port 6380

# Number of shards / cores. 0 = one shard per hardware core.
shards 0
pin-threads yes

# Networking: auto picks io_uring on Linux, else epoll, else poll.
reactor auto
tcp-backlog 1024
tcp-nodelay yes

# Persistence
appendonly yes
appendfilename blazekv.aof
appendfsync everysec
dbfilename blazekv.blaze
dir ./data

# Memory / expiration
maxmemory 0
active-expire-hz 10

# Observability: Prometheus /metrics + dashboard API
metrics-enabled yes
metrics-port 9121

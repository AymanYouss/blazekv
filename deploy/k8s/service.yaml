apiVersion: v1
kind: Service
metadata:
  name: blazekv
  namespace: blazekv
  labels:
    app.kubernetes.io/name: blazekv
spec:
  clusterIP: None  # headless: stable per-pod DNS for the StatefulSet
  selector:
    app.kubernetes.io/name: blazekv
  ports:
    - name: resp
      port: 6380
      targetPort: resp
    - name: metrics
      port: 9121
      targetPort: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: blazekv-client
  namespace: blazekv
  labels:
    app.kubernetes.io/name: blazekv
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: blazekv
  ports:
    - name: resp
      port: 6380
      targetPort: resp

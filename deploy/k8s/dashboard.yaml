apiVersion: apps/v1
kind: Deployment
metadata:
  name: blazekv-dashboard
  namespace: blazekv
  labels:
    app.kubernetes.io/name: blazekv-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: blazekv-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blazekv-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/aymanyouss/blazekv-dashboard:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BLAZEKV_API
              value: "http://blazekv-client.blazekv.svc.cluster.local:9121"
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: blazekv-dashboard
  namespace: blazekv
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: blazekv-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
